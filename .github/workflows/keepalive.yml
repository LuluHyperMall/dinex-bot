name: keep-alive

# Pings the live app every ~10 minutes so the Render free instance never
# sleeps (it spins down after 15 min of no traffic). Free — runs on GitHub.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping app
        run: |
          for i in 1 2 3; do
            curl -fsS --max-time 60 https://dinex-bot.onrender.com/api/ping && exit 0
            echo "retry $i..."; sleep 20
          done
          echo "ping failed (instance may be waking)"; exit 0
